<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="css/homestyle.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left">
        <a href="home.html" class="home-link">Home</a>
    </div>

    <div class="nav-right">
        <a href="classes.html">Classes</a>
        <a href="promotions.html">Promotions</a>
        <a href="membership.html">Membership</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About Us</a>
    </div>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-section">

    <div class="contact-container">

        <div class="contact-info">
            <h1>Contact Us</h1>

            <p>
                Have a question, suggestion, or feedback? We'd love to hear from you.
                Complete the form and our team will get back to you as soon as possible.
            </p>

            <div class="info-box">
                <p><strong>Email:</strong> info@nextgenfitness.co.za</p>
                <p><strong>Phone:</strong> +27 71 014 7815</p>
                <p><strong>Hours:</strong> Mon - Fri: 05:00 - 21:00</p>
            </div>
        </div>

        <div class="contact-form-container">

            <form id="contactForm">

                <input type="text"
                       id="name"
                       placeholder="Full Name"
                       required>

                <input type="email"
                       id="email"
                       placeholder="Email Address"
                       required>

                <input type="text"
                       id="subject"
                       placeholder="Subject"
                       required>

                <textarea id="message"
                          placeholder="Enter your message..."
                          rows="6"
                          required></textarea>

                <button type="submit">
                    Send Message
                </button>

                <p id="formMessage"></p>

            </form>

        </div>

    </div>

</section>

<script src="js/contact.js"></script>

</body>
</html>
